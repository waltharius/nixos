# SOPS Configuration
# This file contains PUBLIC keys only - safe to commit to version control
# Private keys are stored locally and NEVER committed

# =============================================================================
# HOW TO ADD A NEW HOST:
# 1. Generate host key during installation:
#    sudo mkdir -p /var/lib/sops-nix
#    nix-shell -p age --run "age-keygen -o /var/lib/sops-nix/key.txt"
# 2. Get public key:
#    grep 'public key' /var/lib/sops-nix/key.txt
#    # or: nix-shell -p age --run "age-keygen -y /var/lib/sops-nix/key.txt"
# 3. Add public key below under the host's anchor
# 4. Re-encrypt all affected secrets:
#    sops updatekeys secrets/*.yaml
# =============================================================================

keys:
  # Admin key - your personal key for editing secrets
  # Location: ~/.config/sops/age/keys.txt (on your management machine)
  - &admin age1t73dnh9pj2qsz3rfqgq54t2pyxh8ew6w8xsta7pfwmmxmsjswgrshue8gx

  # Host keys - generated on each machine during installation
  # Location on host: /var/lib/sops-nix/key.txt
  - &sukkub age1lrla3ltkfljhshrlp2cqr3mzm3hvyxmka6fjs68ck2ykwgnjygwql9twy2
  - &azazel age1t73dnh9pj2qsz3rfqgq54t2pyxh8ew6w8xsta7pfwmmxmsjswgrshue8gx
  - &servers-shared age1qu4pnzn2teff7m78nrhzq4vct4qczp2ajhfda559xgpk2n08qswqzyh2aw

  # altair - bare-metal homelab server (ASUS ProArt X870E, Ryzen 9 7900)
  # ⚠️  PLACEHOLDER: replace after first boot with real key
  # Steps:
  #   sudo mkdir -p /var/lib/sops-nix
  #   nix-shell -p age --run "age-keygen -o /var/lib/sops-nix/key.txt"
  #   grep 'public key' /var/lib/sops-nix/key.txt
  #   Then replace REPLACE-WITH-ALTAIR-AGE-PUBLIC-KEY below and run:
  #   sops updatekeys secrets/altair.yaml  (once that file exists)
  - &altair age1j73et2st2j8njdn06fsx38e5cgf3z0x00decgjuz3ldhklyk9azsqs9ggj

creation_rules:
  # SSH secrets - shared between all hosts
  - path_regex: secrets/ssh\.yaml$
    key_groups:
      - age:
          - *admin
          - *sukkub
          - *azazel
          - *altair

  # WiFi secrets - shared between all hosts
  - path_regex: secrets/wifi\.env$
    key_groups:
      - age:
          - *admin
          - *sukkub
          - *azazel

  # Common secrets - all hosts
  - path_regex: secrets/common\.yaml$
    key_groups:
      - age:
          - *admin
          - *sukkub
          - *azazel

  # Sukkub-specific secrets
  - path_regex: secrets/sukkub\.yaml$
    key_groups:
      - age:
          - *admin
          - *sukkub

  # Atuin secrets
  - path_regex: secrets/atuin-(password|key)\.txt$
    key_groups:
      - age:
          - *admin
          - *sukkub
          - *azazel
          - *servers-shared
          - *altair

  # Azazel-specific secrets
  - path_regex: secrets/azazel\.yaml$
    key_groups:
      - age:
          - *admin
          - *azazel

  # Nextcloud secrets
  - path_regex: secrets/nextcloud-.*\.txt$
    key_groups:
      - age:
          - *admin
          - *sukkub
          - *servers-shared

  # MariaDB secrets
  - path_regex: secrets/mariadb-.*\.txt$
    key_groups:
      - age:
          - *admin
          - *sukkub
          - *servers-shared

  # altair-specific secrets
  # Add this rule once secrets/altair.yaml is created
  - path_regex: secrets/altair\.yaml$
    key_groups:
      - age:
          - *admin
          - *altair
